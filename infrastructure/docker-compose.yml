services:
    ollama:
        image: ollama/ollama
        restart: unless-stopped
        env_file:
           - env/ollama.env
        ports:
           - "${OLLAMA_PORT:-11434}:11434"
        volumes:
            - ollama_data:/root/.ollama

    db:
        image: postgres:15-alpine
        restart: unless-stopped
        env_file:
            - env/db.env
        environment:
            POSTGRES_USER: ${DATABASE_USER:-owui}
            POSTGRES_PASSWORD: ${DATABASE_PASS:-owui}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            - pg_data:/var/lib/postgresql/data

    vdb:
        image: ankane/pgvector
        restart: unless-stopped
        env_file:
            - env/vdb.env
        environment:
            POSTGRES_USER: ${PGVECTOR_USR:-avdbuser}
            POSTGRES_PASSWORD: ${PGVECTOR_PASS:-avdbpass}
        ports:
            - "${VDB_PORT:-5433}:5432"
        volumes:
            - pgv_data:/var/lib/postgresql/data

    open-webui:
        image: 'ghcr.io/open-webui/open-webui:latest'
        restart: unless-stopped
        env_file:
            - env/openwebui.env
        environment:
            DATABASE_URL: postgresql://${DATABASE_USER:-owui}:${DATABASE_PASS:-owui}@db/owebuidb?sslmode=disable
            PGVECTOR_DB_URL: postgresql://${PGVECTOR_USR:-avdbuser}:${PGVECTOR_PASS:-avdbpass}@vdb/pgvdb?sslmode=disable
            OPENAI_API_BASE_URL: http://pipelines:9099
            OPENAI_API_KEY: ${PIPESERVER_KEY:-0p3n-w3bui}
        depends_on:
            - db
            - vdb
        ports:
            - "${OWEBUI_PORT:-8180}:8080"

    pipelines:
        build:
            context: .
            dockerfile: Dockerfile.pipelines
        restart: unless-stopped
        env_file:
            - env/pipelines.env
        environment:
            PG_CONN_STR: postgresql://${PGVECTOR_USR:-avdbuser}:${PGVECTOR_PASS:-avdbpass}@vdb/pgvdb?sslmode=disable
            TORCH_DEVICE: cpu
            # Proveedor del LLM de generación: groq (API Key, default) u ollama (local, GPU).
            # Ver docs/modos_llm.md. GROQ_API_KEY puede ir vacío cuando LLM_PROVIDER=ollama.
            LLM_PROVIDER: ${LLM_PROVIDER:-groq}
            LLM_MODEL: ${LLM_MODEL:-}
            GROQ_API_KEY: ${GROQ_API_KEY:-}
            PIPELINES_API_KEY: ${PIPESERVER_KEY:-0p3n-w3bui}
        ports:
            - "${PIPELINES_PORT:-9099}:9099"
        extra_hosts:
            - host.docker.internal:host-gateway
        volumes:
            - pipelines:/app/pipelines
            - rawdata:/app/pipelines/rawdata
            - marker_cache:/root/.cache
        depends_on:
            - vdb
            - ollama

volumes:
    ollama_data:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ./appdata/ollama/
    owui_data:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ./appdata/owui/
    pg_data:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ./appdata/postgress/
    pgv_data:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ./appdata/postgress_vector/
    pipelines:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ../src/pipeline/
    rawdata:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: ../data/raw/
    # Caché de modelos de marker-pdf / huggingface (evita re-descargar en cada recreate)
    marker_cache:
        driver: local
