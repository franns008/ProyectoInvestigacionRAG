# Dataset de evaluación del RAG de ciberseguridad.
# Ver docs/eval_harness.md para el diseño completo.
#
# Campos por pregunta:
#   id                : slug estable (se usa en el reporte por-pregunta)
#   category          : categoría de la taxonomía (docs/eval_harness.md)
#   question          : la pregunta tal cual la haría un usuario
#   expected_doc_ids  : ground truth de retrieval (ids determinísticos del store:
#                       cwe-<n>, sha256(cve_id)). Vacío [] = pregunta sin doc
#                       esperado (negativas / fuera de dominio / no indexado aún).
#   expected_sources  : ground truth de retrieval a nivel de FUENTE (nombre del
#                       archivo original, meta.source), para preguntas cuyo
#                       contenido solo vive en el corpus splittable (guías INCIBE
#                       en PDF/MD/DOCX/TXT). A diferencia de expected_doc_ids, el
#                       id de un chunk cambia con la estrategia de chunking (es un
#                       hash del contenido); el nombre de archivo no. Ver
#                       docs/data_splitting.md. Vacío/ausente = no aplica.
#   reference_answer  : respuesta modelo (Tier 2 SAS y Tier 3 juez). Opcional.
#   eval_focus        : [retrieval] / [generation] / [retrieval, generation]
#   tags              : libres, para filtrar
#
# NOTA sobre CVEs: hoy el store tiene 710 CWE y 0 CVE (la ingesta NVD todavía no
# se corrió). Por eso las preguntas de CVE tienen expected_doc_ids: [] y hoy son
# tests de robustez (el RAG debe decir que no lo encuentra, no alucinar). Cuando
# se indexen CVEs, cambiar su expected_doc_ids al sha256(cve_id) real y su
# category a id_cve / nombre_cve.

# ── id_cwe: CWE por número exacto ───────────────────────────────────────────
- id: cwe89-por-numero
  category: id_cwe
  question: "Explicame la vulnerabilidad CWE-89 y cómo prevenirla."
  expected_doc_ids: ["cwe-89"]
  reference_answer: |
    CWE-89 es SQL Injection: ocurre cuando entrada no sanitizada se interpola en
    una consulta SQL y altera su lógica, permitiendo leer o modificar datos no
    autorizados. Se previene con consultas parametrizadas / prepared statements,
    ORMs seguros, validación de entrada y el principio de menor privilegio en la BD.
  eval_focus: [retrieval, generation]
  tags: [injection, es]

- id: cwe79-por-numero
  category: id_cwe
  question: "¿Qué describe la CWE-79?"
  expected_doc_ids: ["cwe-79"]
  reference_answer: |
    CWE-79 es Cross-Site Scripting (XSS): neutralización incorrecta de la entrada
    al generar una página web, lo que permite inyectar scripts que se ejecutan en
    el navegador de otros usuarios.
  eval_focus: [retrieval, generation]
  tags: [xss, es]

- id: cwe798-por-numero
  category: id_cwe
  question: "¿Qué riesgo de seguridad describe CWE-798?"
  expected_doc_ids: ["cwe-798"]
  reference_answer: |
    CWE-798 es el uso de credenciales embebidas (hard-coded) en el código o la
    configuración: contraseñas, claves o tokens fijos que un atacante puede
    descubrir y reutilizar. Se mitiga externalizando secretos a un gestor de
    secretos o variables de entorno y rotándolos.
  eval_focus: [retrieval, generation]
  tags: [credenciales, es]

