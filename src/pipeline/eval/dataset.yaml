# ── nombre_cwe: por nombre/concepto (incluye EN) ────────────────────────────
- id: sqli-en
  category: nombre_cwe
  question: "What is SQL injection and how do I prevent it?"
  expected_doc_ids: ["cwe-89"]
  reference_answer: |
    SQL injection (CWE-89) happens when unsanitized input is concatenated into a
    SQL query, letting an attacker change its logic. Prevent it with parameterized
    queries / prepared statements, input validation and least-privilege DB accounts.
  eval_focus: [retrieval, generation]
  tags: [injection, en]

- id: buffer-overflow-nombre
  category: nombre_cwe
  question: "¿Qué es un buffer overflow?"
  expected_doc_ids: ["cwe-120"]
  reference_answer: |
    Un buffer overflow (CWE-120) ocurre al copiar datos a un búfer sin verificar
    su tamaño, sobrescribiendo memoria adyacente. Puede corromper datos, provocar
    caídas o ejecución de código.
  eval_focus: [retrieval, generation]
  tags: [memory, es]

- id: ssrf-nombre
  category: nombre_cwe
  question: "¿Qué es un ataque SSRF?"
  expected_doc_ids: ["cwe-918"]
  eval_focus: [retrieval, generation]
  tags: [ssrf, es]

